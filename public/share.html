<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shared Game — VibeGamer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <div class="inner">
    <h1><a href="/" style="color:inherit;">🎮 VibeGamer</a></h1>
    <p class="tagline">Shared game</p>
  </div>
</header>

<main class="container">

  <div class="card" id="meta-card">
    <p style="color:var(--text-muted); font-size:0.85rem; margin:0 0 12px;">Loading…</p>
  </div>

  <div id="play-bar" class="hidden flex-gap" style="margin-bottom:20px;">
    <button class="btn btn-primary" id="play-btn" onclick="playGame()">▶ Play Game</button>
    <button class="btn btn-secondary" id="fork-btn" onclick="forkGame()">✏️ Fork &amp; Edit</button>
  </div>

  <div id="game-section" class="hidden">
    <div class="game-wrapper">
      <iframe
        id="game-frame"
        sandbox="allow-scripts"
        title="Shared game"
        loading="lazy"
      ></iframe>
    </div>
  </div>

</main>

<script src="/share.js"></script>
</body>
</html>
