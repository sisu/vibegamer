<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VibeGamer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <div class="inner">
    <h1><a href="/" style="color:inherit;">🎮 VibeGamer</a></h1>
    <p class="tagline">AI Game Prototyper</p>
  </div>
</header>

<main class="container">

  <details class="foldable" id="prompts-details">
    <summary>Prompts used</summary>
    <ol id="prompts-list" class="prompt-list" style="margin-top:12px;"></ol>
  </details>

  <details class="foldable" id="game-details" open>
    <summary>Game</summary>
    <div class="game-wrapper" style="margin-top:12px;">
      <iframe id="game-frame" sandbox="allow-scripts" title="Game"></iframe>
    </div>
  </details>

  <div id="action-bar">
    <div class="field">
      <label for="refine-model-select">Model</label>
      <select id="refine-model-select"></select>
    </div>
    <div class="field" style="flex:2;">
      <label for="refinement">Refine your game</label>
      <input type="text" id="refinement"
        placeholder="e.g. Add a score counter and make enemies faster"
        maxlength="500">
    </div>
    <div style="display:flex; gap:8px; padding-bottom:1px;">
      <button class="btn btn-primary" id="refine-btn" onclick="refineGame()">🔄 Refine</button>
      <button class="btn btn-secondary" onclick="shareGame()">🔗 Share</button>
    </div>
  </div>

  <div id="status"></div>

</main>

<script src="/game.js"></script>
</body>
</html>
